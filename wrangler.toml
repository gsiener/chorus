name = "chorus"
main = "src/index.ts"
compatibility_date = "2025-11-17"
compatibility_flags = ["nodejs_compat", "nodejs_als"]

# KV namespace for knowledge base documents
[[kv_namespaces]]
binding = "DOCS_KV"
id = "bf1f6f46baef45abb76000eaa432814f"

# Vectorize for semantic document search
[[vectorize]]
binding = "VECTORIZE"
index_name = "chorus-docs"

# Workers AI for generating embeddings
[ai]
binding = "AI"

# Secrets (set via `wrangler secret put`):
# - SLACK_BOT_TOKEN
# - SLACK_SIGNING_SECRET
# - ANTHROPIC_API_KEY
# - HONEYCOMB_API_KEY
# - COMPANY_NAME
# - RD_PRIORITIES_INITIATIVE_ID

# Cron triggers:
#   0 14 * * *   - Daily 9am ET: check-ins, brief checks, cache warming
#   30 14 * * 1  - Monday 9:30am ET: weekly product metrics report (separate so it
#                  runs against a pre-warmed cache and doesn't compete for CPU/wall time)
[triggers]
crons = ["0 14 * * *", "30 14 * * 1"]

# Native OpenTelemetry export to Honeycomb
# Destinations configured in Cloudflare Dashboard:
#   Workers & Pages → chorus → Settings → Observability → Destinations
[observability.traces]
enabled = true
destinations = ["honeycomb-traces"]

[observability.logs]
enabled = true
destinations = ["honeycomb-logs"]

# Import .md files as text modules
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true
